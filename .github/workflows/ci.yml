name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

defaults:
  run:
    working-directory: financekit

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with flake8
        run: |
          python -m flake8 financekit/ --max-line-length=120 --extend-ignore=E203 --statistics

      - name: Type check with mypy
        run: |
          python -m mypy financekit/

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --cov=financekit --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.11' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          files: ./financekit/coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
